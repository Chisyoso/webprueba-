<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PS4 RGB Control</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
    padding: 20px;
}

h1 { color: #22c55e; }

.button-box {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
}

.button-box div {
    width: 80px;
    height: 80px;
    line-height: 80px;
    border-radius: 50%;
    background: #1e293b;
    font-size: 24px;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.active {
    transform: scale(1.3);
    background: #22c55e;
    box-shadow: 0 0 25px #22c55e;
}

#feedback {
    margin-top: 30px;
    font-size: 20px;
    color: #22c55e;
}
</style>

</head>
<body>

<h1>🎮 Control RGB PRO</h1>
<p>Presiona botones del control</p>

<div class="button-box">
    <div id="triangulo">▲</div>
    <div id="x">✖</div>
    <div id="cuadrado">■</div>
    <div id="circulo">●</div>
</div>

<p id="feedback">Esperando...</p>

<script>
const BASE_URL = "http://192.168.1.7/";

let bloqueado = false;
let botonPresionado = false; // 🔥 clave
let ultimoComando = "";

// Activar animación
function animar(id, texto){
    let el = document.getElementById(id);
    el.classList.add("active");
    document.getElementById("feedback").innerText = texto;

    setTimeout(() => el.classList.remove("active"), 300);
}

// Enviar comando REAL
function enviar(cmd, id){
    if(bloqueado || cmd === ultimoComando) return;

    bloqueado = true;
    ultimoComando = cmd;

    animar(id, "Comando: " + cmd);

    // 🔥 REDIRECCIÓN (único método que te funciona)
    window.location.href = BASE_URL + cmd;
}

// Gamepad loop
setInterval(() => {
    const gp = navigator.getGamepads()[0];
    if(!gp) return;

    // Detectar si TODOS están sueltos
    const ningunoPresionado = !gp.buttons[0].pressed &&
                              !gp.buttons[1].pressed &&
                              !gp.buttons[2].pressed &&
                              !gp.buttons[3].pressed;

    // 🔥 RESETEAR cuando sueltas
    if(ningunoPresionado){
        botonPresionado = false;
        bloqueado = false;
        ultimoComando = "";
        return;
    }

    // 🔥 EVITAR repetir mientras esté presionado
    if(botonPresionado) return;

    // Detectar nuevo click
    if(gp.buttons[3].pressed){
        enviar("UP","triangulo");
        botonPresionado = true;
    }
    else if(gp.buttons[0].pressed){
        enviar("DOWN","x");
        botonPresionado = true;
    }
    else if(gp.buttons[2].pressed){
        enviar("LEFTH","cuadrado");
        botonPresionado = true;
    }
    else if(gp.buttons[1].pressed){
        enviar("RIGHT","circulo");
        botonPresionado = true;
    }

}, 100);
</script>

</body>
</html>
