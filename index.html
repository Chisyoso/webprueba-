<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PS4 RGB Control</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f0f4f8;
    color: #333;
    padding: 20px;
}
h1 { color: #0f9d58; margin-bottom: 10px; }

.button-box {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
}

.button-box a {
    display: inline-block;
    width: 80px;
    height: 80px;
    line-height: 80px;
    border-radius: 50%;
    background: #e0e0e0;
    text-decoration: none;
    color: #333;
    font-size: 24px;
    transition: all 0.3s;
    user-select: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.button-box a.active {
    background: #0f9d58;
    color: white;
    transform: scale(1.3) rotate(-5deg);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.button-box a:disabled {
    pointer-events: none;
    opacity: 0.5;
}

#feedback {
    margin-top: 30px;
    font-size: 20px;
    font-weight: bold;
    color: #0f9d58;
}
</style>
</head>
<body>
<h1>Control RGB con PS4</h1>
<p>Presiona Triángulo, X, Cuadrado o Círculo</p>

<div class="button-box">
    <a id="triangulo" href="#">▲</a>
    <a id="x" href="#">✖</a>
    <a id="cuadrado" href="#">■</a>
    <a id="circulo" href="#">●</a>
</div>

<p id="feedback">Esperando comando...</p>

<script>
// ==================== CONFIG ====================
const BASE_IP = "192.168.1.7";  // IP de tu ESP
const BASE_URL = "http://" + BASE_IP + "/";
const COOLDOWN = 1000; // ms entre comandos

let bloqueado = false;
let ultimoComando = "";

// Mapeo visual de botones
const botones = {
    "triangulo": "UP",
    "x": "DOWN",
    "cuadrado": "LEFTH",
    "circulo": "RIGHT"
};

// ==================== FUNCIONES ====================
function enviarComando(cmd, botonId){
    if(bloqueado) return;   // Si está bloqueado, no hace nada
    bloqueado = true;       // Bloqueamos temporalmente

    // Redirección al ESP
    window.location.href = BASE_URL + cmd;
    
    // Animación del botón
    const boton = document.getElementById(botonId);
    boton.classList.add("active");
    document.getElementById("feedback").innerText = "Comando: " + cmd;

    // Desbloqueo y quitar animación después de COOLDOWN
    setTimeout(() => {
        boton.classList.remove("active");
        bloqueado = false;
    }, COOLDOWN);
}

// ==================== BOTONES EN PANTALLA ====================
for(const id in botones){
    const cmd = botones[id];
    document.getElementById(id).addEventListener("click", () => {
        enviarComando(cmd, id);
    });
}

// ==================== GAMEPAD ====================
setInterval(() => {
    if(bloqueado) return; // Evitar repetir comandos
    const gp = navigator.getGamepads()[0];
    if(!gp) return;

    if(gp.buttons[3].pressed) enviarComando("UP","triangulo");      // Triángulo
    else if(gp.buttons[0].pressed) enviarComando("DOWN","x");        // X
    else if(gp.buttons[2].pressed) enviarComando("LEFTH","cuadrado"); // Cuadrado
    else if(gp.buttons[1].pressed) enviarComando("RIGHT","circulo"); // Círculo
}, 100);
</script>
</body>
</html>
