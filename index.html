<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control RGB 🎮</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

h1 {
    margin-top: 20px;
}

.estado {
    margin-top: 15px;
    font-size: 18px;
    color: #0f9d58;
}

/* JOYSTICK VISUAL */
.joystick {
    margin: 40px auto;
    width: 200px;
    height: 200px;
    background: #222;
    border-radius: 50%;
    position: relative;
}

.punto {
    width: 40px;
    height: 40px;
    background: #0f9d58;
    border-radius: 50%;
    position: absolute;
    top: 80px;
    left: 80px;
    transition: 0.1s;
}
</style>
</head>

<body onload="iniciarControl()">

<h1>🎮 Control RGB</h1>
<p>Joystick izquierdo</p>

<div class="joystick">
    <div class="punto" id="punto"></div>
</div>

<div class="estado" id="estado">Esperando control...</div>

<!-- iframe oculto para enviar comandos -->
<iframe id="esp" style="display:none;"></iframe>

<script src="script.js"></script>
</body>
</html>
