<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Joystick RGB Control</title>
<style>
#estado {
    font-size: 20px;
    text-align: center;
    margin-top: 20px;
}
</style>
</head>
<body>
<h1>Joystick RGB Control</h1>
<p id="estado">Conecta tu control y muévelo</p>

<script src="script.js"></script>
<script>
function mostrarEstado() {
    const gp = navigator.getGamepads()[0];
    if(gp) {
        document.getElementById("estado").innerText =
            "Ejes: [" + gp.axes[0].toFixed(2) + "," + gp.axes[1].toFixed(2) + "]";
    }
    requestAnimationFrame(mostrarEstado);
}
requestAnimationFrame(mostrarEstado);
</script>
</body>
</html>
