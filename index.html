<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PS4 RGB Control</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f7fa;
    color: #333;
    padding: 20px;
}

h1 { color: #0f9d58; }

#feedback {
    margin-top: 30px;
    font-size: 24px;
    font-weight: bold;
    color: #0f9d58;
}

.button-box {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
}

.button-box div {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #e0e0e0;
    line-height: 80px;
    font-size: 24px;
    cursor: pointer;
    user-select: none;
    transition: all 0.2s;
}

.button-box div.active {
    background: #0f9d58;
    color: white;
    transform: scale(1.2);
}
</style>
</head>
<body>
<h1>Control RGB con PS4</h1>

<p>Presiona Triángulo, X, Cuadrado o Círculo en tu control</p>

<div class="button-box">
    <div id="triangulo">▲</div>
    <div id="x">✖</div>
    <div id="cuadrado">■</div>
    <div id="circulo">●</div>
</div>

<p id="feedback">Esperando comando...</p>

<script src="script.js"></script>
</body>
</html>
